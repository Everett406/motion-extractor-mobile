name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache OpenCV SDK
        uses: actions/cache@v4
        with:
          path: opencv-sdk
          key: ${{ runner.os }}-opencv-4.10.0

      - name: Download and set up OpenCV Android SDK
        run: bash scripts/setup-opencv.sh

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 -d > app/release.keystore
          else
            echo "WARNING: RELEASE_KEYSTORE secret not set. Release build will fail."
          fi

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: motion-extractor-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Motion Extractor v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            自动构建的 Android Release APK（已签名）。

            安装后从相册选择视频，调节参数即可预览/导出「运动提取」效果。

            构建时间：${{ github.event.head_commit.timestamp }}
            提交：${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
